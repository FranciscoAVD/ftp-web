services:
  ftp-server:
    image: delfer/alpine-ftp-server
    container_name: ftp-test-server
    ports:
      - "${FTP_CONTROL_PORT}:21"
      - "${FTP_MIN_PASSIVE_PORT}-${FTP_MAX_PASSIVE_PORT}:${FTP_MIN_PASSIVE_PORT}-${FTP_MAX_PASSIVE_PORT}"
    environment:
      - USERS=${FTP_DEFAULT_USER}|${FTP_DEFAULT_USER_PASS}
      - ADDRESS=${FTP_HOST}
      - MIN_PORT=${FTP_MIN_PASSIVE_PORT}
      - MAX_PORT=${FTP_MAX_PASSIVE_PORT}
    volumes:
      - ./ftp_data:/home/${FTP_DEFAULT_USER}
